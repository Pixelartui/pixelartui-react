name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Publish as pre-release (beta)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            npx standard-version --release-as ${{ inputs.version }} --prerelease beta
          else
            npx standard-version --release-as ${{ inputs.version }}
          fi

      - name: Push tag and changelog
        run: git push --follow-tags origin main

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            npm publish --provenance --tag beta
          else
            npm publish --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG".."$TAG")
          else
            NOTES=$(git log --pretty=format:"- %s" "$TAG")
          fi
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            $PRERELEASE_FLAG
